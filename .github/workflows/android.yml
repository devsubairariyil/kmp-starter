name: Android

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5
      - name: Generate OpenAPI clients
        run: ./gradlew :core:network:openApiGenerate
      - name: Formatting
        run: ./gradlew spotlessCheck
      - name: Static analysis
        run: ./gradlew detekt ktlintCheck
      - name: Unit tests
        run: ./gradlew test
      - name: Lint
        run: ./gradlew lint
      - name: Assemble debug APK
        run: ./gradlew :app:assembleNonProdDebug

  assemble-release:
    if: github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5
      - name: Build release artifact
        run: ./gradlew :app:assembleProdRelease
      - uses: actions/upload-artifact@v5
        with:
          name: kmpstarter-prod-release
          path: app/build/outputs/**/*.apk
